name: Update Solana Live Data

on:
  schedule:
    - cron: '7 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build scout + fetch live data
        run: |
          npm run build:data

      - name: Commit updated data
        run: |
          if git diff --quiet data/live-data.json data/scout-findings.json; then
            echo "No data changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/live-data.json data/scout-findings.json
          git commit -m "chore: refresh live + scout Solana data"
          git push
